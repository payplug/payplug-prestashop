name: Testing Pipeline
on:
  push:
    branches:
      - master
      - develop
  pull_request:

jobs:
  check-php-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer PHP 7.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.2'
      - name: Vérifier la syntaxe de tous les fichiers PHP
        run: |
          find . -type f -name "*.php" ! -name "index.php" -print0 | xargs -0 -n1 php -l

  composer-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
      - name: Récupération des fichiers dist payplug
        run: ./dev/ci/dist_files.sh -b payplug
      - name: Installer les dépendances Composer
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Upload vendor
        uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor

  linter:
    runs-on: ubuntu-latest
    needs: composer-install
    steps:
      - uses: actions/checkout@v4
      - name: Installer PHP 7.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.2'
      - name: Download vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor
      - name: Run linter
        run: chmod +x ./vendor/bin/php-cs-fixer && ./vendor/bin/php-cs-fixer fix -vvv --dry-run --using-cache=no

  test-php-unit:
    runs-on: ubuntu-latest
    needs: composer-install
    strategy:
      matrix:
        php-versions: [ '7.4', '8.0' ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: xdebug
      - name: Download vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor
      - name: Dump php version
        run: php -v
      - name: Récupération des fichiers dist payplug
        run: ./dev/ci/dist_files.sh -b payplug
      - name: PHPUnit
        run: chmod +x ./vendor/bin/phpunit && ./vendor/bin/phpunit tests --bootstrap tests/bootstrap.php --coverage-text --colors=never -d memory_limit=-1
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-tests
          path: report/junit-tests.xml
      - name: Upload couverture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: report/coverage.xml

