header:
  pattern: "^## \\[v?(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)\\] - (?P<date>[0-9]{4}-[0-9]{2}-[0-9]{2})$"
  pattern_maps:
    - version
    - date
  template: |
    ## [{{.Version}}] - {{.Date}}

    {{range .CommitGroups}}
    ### {{.Title}}
    {{range .Commits}}
    - {{if .Scope}}**{{.Scope}}:** {{end}}{{.Subject}}
    {{end}}
    {{end}}

commit_groups:
  - title_maps:
      feat: "Features"
      fix: "Bug Fixes"
      docs: "Documentation"
      style: "Styles"
      refactor: "Code Refactoring"
      perf: "Performance Improvements"
      test: "Tests"
      build: "Build System"
      ci: "Continuous Integration"