include:
  - project: 'payplug/releasy'
    file: '/templates/main.gitlab-ci.yml'

stages:
  - releasy-review
  - coverage
  - check php
  - tests
  - translations
  - build
  - releasy-release

coverage test:
  image: php:7.2.1
  stage: coverage
  cache:
    paths:
      - vendor/
  before_script:
    # Install git, the php image doesn't have installed
    - apt-get update -yqq
    - apt-get install git -yqq

    # Install Xdebug
    - pecl install xdebug
    - docker-php-ext-enable xdebug

    # Install composer version 1
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer --version=1.10.16

    # Install all project dependencies
    - composer install
  script:
    - echo 'xdebug.mode=coverage' >> /usr/local/etc/php/php.ini
    - vendor/bin/phpunit --coverage-text --colors=never

php cs fixer:
  image: composer:1.9
  stage: check php
  script:
    - composer install
    - vendor/bin/php-cs-fixer fix -vvv --dry-run --using-cache=no

unit tests:
  image: composer:1.9
  stage: tests
  script:
    - composer install
    - echo 'error_reporting=22527' > /usr/local/etc/php/conf.d/ci.ini
    - vendor/phpunit/phpunit/phpunit --bootstrap test/init.php test/tests
    - vendor/phpunit/phpunit/phpunit --exclude dev tests

check module translations:
  image: php:7.4
  stage: translations
  script:
    - >
        RED='\033[0;31m';
        ORANGE='\033[0;33m';
        php ci/translations.php $CI_MERGE_REQUEST_TARGET_BRANCH_NAME || exit_code=$?;
        if [ $exit_code -eq 137 ]; then echo -e "\n${ORANGE}WARNING: MISSING TRANSLATION !! :O\n"; exit 126 ; fi;
        if [ $exit_code -eq 1 ]; then echo -e "\n${RED}ERROR : MISSING MANDATORY TRANSLATION !!!\n"; exit 1;
        elif [ $exit_code -ne 0 ]; then echo -e "\n${RED}FATAL ERROR : SOMETHING UNEXPECTED HAPPENED... EXIT CODE: $exit_code\n"; exit 1; fi;
  allow_failure:
    exit_codes: 126
  artifacts:
    paths:
      - ci/translations.csv

build zip release:
  image: composer:1.9
  stage: build
  before_script:
    - composer install --no-dev
    - ./ci/copy_translations.sh
    - ./ci/assets_revision.sh
    - find ./vendor -type d -exec cp index.php {} \;
    - git status
    - mkdir payplug
  script:
    - shopt -s extglob
    - mv !(payplug|composer.json) payplug
    - composer archive --file payplug_$CI_COMMIT_REF_NAME --format zip
    - sed -i 's/api.payplug.com/api-qa.payplug.com/' ./payplug/vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php
    - composer archive --file payplug_qa_$CI_COMMIT_REF_NAME --format zip
  artifacts:
    paths:
      - payplug_$CI_COMMIT_REF_NAME.zip
      - payplug_qa_$CI_COMMIT_REF_NAME.zip