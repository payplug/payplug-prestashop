include:
  - project: 'payplug/releasy'
    file: '/templates/main.gitlab-ci.yml'

stages:
  - check php
  - check-php-version
  - coverage and tests
  - releasy-review
  - translations
  - assets
  - build
  - asset-pspaylater
  - build-pspaylater
  - run_test
  - releasy-release

php cs fixer:
  image: composer:1.9
  stage: check php
  rules:
    - if: '$CI_COMMIT_BRANCH
      || $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]$/'
  script:
    - ./dev/ci/dist_files.sh -b payplug
    - composer install
    - vendor/bin/php-cs-fixer fix -vvv --dry-run --using-cache=no
  artifacts:
    paths:
      - vendor

check php version:
  image: php:8.0-alpine
  stage: check-php-version
  rules:
    - if: '$CI_COMMIT_BRANCH
      || $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]$/'
  script:
    - >
      RED='\033[0;31m';
      ORANGE='\033[0;33m';
      php dev/ci/check_php.php || exit_code=$?;
      if [ $exit_code -eq 137 ]; then echo -e "\n${ORANGE}WARNING DETECTED!! \n"; exit 126 ; fi;
      if [ $exit_code -eq 1 ]; then echo -e "\n${RED}ERROR DETECTED!!!\n"; exit 1;
      elif [ $exit_code -ne 0 ]; then echo -e "\n${RED}FATAL ERROR : SOMETHING UNEXPECTED HAPPENED... EXIT CODE: $exit_code\n"; exit 1; fi;
  allow_failure:
    exit_codes: 126

coverage test:
  image: php:7.2.1
  stage: coverage and tests
  rules:
    - if: '$CI_COMMIT_BRANCH
      || $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]$/'
  coverage: '/^\s*Lines:\s*(\d+\.\d+)\%/'
  before_script:
    - pecl install xdebug-3.1.6
    - docker-php-ext-enable xdebug
  script:
    - echo 'xdebug.mode=coverage' >> /usr/local/etc/php/php.ini
    - echo 'error_reporting=22527' > /usr/local/etc/php/conf.d/ci.ini
    - vendor/bin/phpunit --coverage-text --colors=never

check module translations:
  image: composer:1.9
  stage: translations
  rules:
    - if: '$CI_COMMIT_BRANCH
      || $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]$/'
  script:
    - ./dev/ci/dist_files.sh -b payplug
    - composer install
    - >
      RED='\033[0;31m';
      ORANGE='\033[0;33m';
      exit_code=0; php dev/ci/generate-translations.php $CI_MERGE_REQUEST_TARGET_BRANCH_NAME || exit_code=$?;
      if [ $exit_code -eq 137 ]; then echo -e "\n${ORANGE}WARNING: MISSING TRANSLATION !! :O\n"; exit 126 ; fi;
      if [ $exit_code -eq 1 ]; then echo -e "\n${RED}ERROR : MISSING MANDATORY TRANSLATION !!!\n"; exit 1;
      elif [ $exit_code -ne 0 ]; then echo -e "\n${RED}FATAL ERROR : SOMETHING UNEXPECTED HAPPENED... EXIT CODE: $exit_code\n"; exit 1; fi;
  allow_failure:
    exit_codes: 126
  artifacts:
    paths:
      - dev/dist/pspaylater/translations.csv
      - dev/dist/payplug/translations.csv

assets:
  image: node:16
  stage: assets
  rules:
    - if: '$CI_COMMIT_BRANCH
      || $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]$/'
  before_script:
    - ./dev/ci/dist_files.sh -b payplug
    - npm --version
    - npm init -y
    - npm install --save-dev webpack
  script:
    - npm run build
    - ./dev/ci/set_licenses.sh -b payplug
    - echo "Moving file in build dir"
    - mkdir ./views/build
    - mkdir ./views/build/css
    - mkdir ./views/build/js
    - mv ./views/css/*.css ./views/build/css
    - cp ./views/templates/index.php ./views/build/css
    - mv ./views/js/* ./views/build/js
    - ls -l ./views/build/css/*.css
    - ls -l ./views/build/css/*.php
    - ls -l ./views/build/js/*.js
  artifacts:
    paths:
      - views/build/*
    expire_in: 1 day

build zip release:
  image: composer:1.9
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH
      || $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]$/'
  before_script:
    - ./dev/ci/dist_files.sh -b payplug
    - rm -rf ./vendor
    - composer install --no-dev
    - rm webpack.config.js
    - ./dev/ci/secure_directories.sh
    - git status
    - ./dev/ci/assets_revision.sh -b payplug
    - ./dev/ci/update_year.sh
    - php ./dev/ci/import-translations.php
  script:
    - shopt -s extglob
    - ./dev/ci/build.sh -n payplug -c $CI_COMMIT_REF_NAME
  after_script:
    - if [ ! -f "payplug_$CI_COMMIT_REF_NAME.zip" ] || [ ! -f "payplug_qa_$CI_COMMIT_REF_NAME.zip" ]; then
      echo "ZIP files were not created. Failing the job.";
      exit 1;
      fi

  artifacts:
    paths:
      - payplug_$CI_COMMIT_REF_NAME.zip
      - payplug_qa_$CI_COMMIT_REF_NAME.zip

asset-pspaylater:
  image: node:16
  stage: asset-pspaylater
  rules:
    - if: '$CI_COMMIT_BRANCH
      || $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]$/'
  before_script:
    - ./dev/ci/dist_files.sh -b pspaylater
    - npm --version
    - npm init -y
    - npm install --save-dev webpack
  script:
    - npm run build
    - ./dev/ci/set_licenses.sh -b pspaylater
    - echo "Moving file in build dir"
    - mkdir ./views/build-bnpl
    - mkdir ./views/build-bnpl/css
    - mkdir ./views/build-bnpl/js
    - mv ./views/css/*.css ./views/build-bnpl/css
    - cp ./views/templates/index.php ./views/build-bnpl/css
    - mv ./views/js/* ./views/build-bnpl/js
    - ls -l ./views/build-bnpl/css/*.css
    - ls -l ./views/build-bnpl/css/*.php
    - ls -l ./views/build-bnpl/js/*.js
  artifacts:
    paths:
      - views/build-bnpl/*
    expire_in: 1 day

build-pspaylater:
  image: composer:1.9
  stage: build-pspaylater
  rules:
    - if: '$CI_COMMIT_BRANCH
      || $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]$/'
  before_script:
    - ./dev/ci/dist_files.sh -b pspaylater
    - ls -als ./vendor
    - rm -rf ./vendor
    - ./dev/ci/set_namespace.sh
    - ./dev/ci/set_translation.sh
    - composer install --no-dev
    - ./dev/ci/secure_directories.sh
    - git status
    - rm -rf views/build && mv views/build-bnpl views/build
    - ./dev/ci/assets_revision.sh -b pspaylater
    - ./dev/ci/update_year.sh
    - mkdir pspaylater
    - php ./dev/ci/import-translations.php
  script:
    - shopt -s extglob
    - ./dev/ci/build.sh -n pspaylater -c $CI_COMMIT_REF_NAME
  after_script:
    - if [ ! -f "pspaylater_$CI_COMMIT_REF_NAME.zip" ] || [ ! -f "pspaylater_qa_$CI_COMMIT_REF_NAME.zip" ]; then
      echo "ZIP files were not created. Failing the job.";
      exit 1;
      fi
  artifacts:
    paths:
      - pspaylater_$CI_COMMIT_REF_NAME.zip
      - pspaylater_qa_$CI_COMMIT_REF_NAME.zip

run_test:
  image: composer:1.9
  stage: run_test
  needs:
    - build-pspaylater
  rules:
    - if: '$CI_COMMIT_REF_NAME == $CI_COMMIT_BRANCH
      && ($CI_MERGE_REQUEST_LABELS =~ /smokes/ || $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]$/)'
      when: always
    - when: never
  script:
    - echo $CI_MERGE_REQUEST_LABELS
    - echo "The smoke test label is defined. The functional tests will be triggered"
    - curl -s
      -X POST
      -F token=$CI_JOB_TOKEN
      -F ref=master
      -F "variables[PS_SOURCE_BRANCH]=${CI_COMMIT_REF_NAME}"
      -F "variables[STAGES_TO_RUN]=smoke_presta_17"
      https://git.payplug.com/api/v4/projects/41/trigger/pipeline
