include:
  - project: 'payplug/releasy'
    file: '/templates/main.gitlab-ci.yml'

stages:
  - check php
  - check-php-version
  - coverage and tests
  - releasy-review
  - translations
  - assets
  - build
  - releasy-release

php cs fixer:
  image: composer:1.9
  stage: check php
  script:
    - ./_dev/ci/dist-files.sh
    - composer install
    - vendor/bin/php-cs-fixer fix -vvv --dry-run --using-cache=no
  artifacts:
    paths:
      - vendor

check php version:
  image: php:8.0-alpine
  stage: check-php-version
  script:
    - >
      RED='\033[0;31m';
      ORANGE='\033[0;33m';
      php _dev/ci/check_php.php || exit_code=$?;
      if [ $exit_code -eq 137 ]; then echo -e "\n${ORANGE}WARNING DETECTED!! \n"; exit 126 ; fi;
      if [ $exit_code -eq 1 ]; then echo -e "\n${RED}ERROR DETECTED!!!\n"; exit 1;
      elif [ $exit_code -ne 0 ]; then echo -e "\n${RED}FATAL ERROR : SOMETHING UNEXPECTED HAPPENED... EXIT CODE: $exit_code\n"; exit 1; fi;
  allow_failure:
    exit_codes: 126

coverage test:
  image: php:7.2.1
  stage: coverage and tests
  before_script:
    # Install Xdebug
    - pecl install xdebug
    - docker-php-ext-enable xdebug
  script:
    - echo 'xdebug.mode=coverage' >> /usr/local/etc/php/php.ini
    - echo 'error_reporting=22527' > /usr/local/etc/php/conf.d/ci.ini
    - vendor/bin/phpunit --coverage-text --colors=never

check module translations:
  image: php:7.4
  stage: translations
  script:
    - >
        RED='\033[0;31m';
        ORANGE='\033[0;33m';
        php _dev/ci/translations.php $CI_MERGE_REQUEST_TARGET_BRANCH_NAME || exit_code=$?;
        if [ $exit_code -eq 137 ]; then echo -e "\n${ORANGE}WARNING: MISSING TRANSLATION !! :O\n"; exit 126 ; fi;
        if [ $exit_code -eq 1 ]; then echo -e "\n${RED}ERROR : MISSING MANDATORY TRANSLATION !!!\n"; exit 1;
        elif [ $exit_code -ne 0 ]; then echo -e "\n${RED}FATAL ERROR : SOMETHING UNEXPECTED HAPPENED... EXIT CODE: $exit_code\n"; exit 1; fi;
  allow_failure:
    exit_codes: 126
  artifacts:
    paths:
      - _dev/ci/translations.csv

assets compile and revision:
  image: node:16
  stage: assets
  before_script:
    - npm --version
    - npm init -y
    - npm install --save-dev webpack
  script:
    - npm run build
    - echo "Moving file in build dir"
    - mkdir ./views/build
    - mkdir ./views/build/css
    - mkdir ./views/build/js
    - mv ./views/css/*.css ./views/build/css
    - cp ./views/templates/index.php ./views/build/css
    - mv ./views/js/* ./views/build/js
    - ls -l ./views/build/css/*.css
    - ls -l ./views/build/css/*.php
    - ls -l ./views/build/js/*.js
  artifacts:
    paths:
      - views/build/*
    expire_in: 1 day

build zip release:
  image: composer:1.9
  stage: build
  before_script:
    - php ./_dev/ci/generate-version.php
    - php ./_dev/ci/generate-upgrade.php
    - php ./vendor/bin/php-cs-fixer fix -vvv upgrade
    - rm -r ./vendor
    - ./_dev/ci/dist-files.sh
    - composer install --no-dev
    - rm webpack.config.js
    - ./_dev/ci/copy_translations.sh
    - find ./vendor -type d -exec cp index.php {} \;
    - git status
    - chmod 777 ./_dev/ci/assets_revision.sh && ./_dev/ci/assets_revision.sh
    - mkdir payplug
  script:
    - shopt -s extglob
    - mv !(payplug|composer.json) payplug
    - cp composer.json ./payplug
    - composer archive --file payplug_$CI_COMMIT_REF_NAME --format zip
    - sed -i 's/api.payplug.com/api-qa.payplug.com/' ./payplug/vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php
    - composer archive --file payplug_qa_$CI_COMMIT_REF_NAME --format zip
  artifacts:
    paths:
      - payplug_$CI_COMMIT_REF_NAME.zip
      - payplug_qa_$CI_COMMIT_REF_NAME.zip

build zip bancontact:
  image: composer:1.9
  stage: build
  before_script:
    - php ./_dev/ci/generate-version.php
    - php ./_dev/ci/generate-upgrade.php
    - php ./vendor/bin/php-cs-fixer fix -vvv upgrade
    - rm -r ./vendor
    - ./_dev/ci/dist-files.sh
    - composer install --no-dev
    - composer require payplug/payplug-php:dev-wip-bancontact --ignore-platform-reqs php
    - ./_dev/ci/copy_translations.sh
    - find ./vendor -type d -exec cp index.php {} \;
    - git status
    - chmod 777 ./_dev/ci/assets_revision.sh && ./_dev/ci/assets_revision.sh
    - mkdir payplug
  script:
    - shopt -s extglob
    - mv !(payplug|composer.json) payplug
    - cp composer.json ./payplug
    - sed -i 's/api.payplug.com/api-qa.payplug.com/' ./payplug/vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php
    - composer archive --file payplug_qa_bancontact_$CI_COMMIT_REF_NAME --format zip
  artifacts:
    paths:
      - payplug_qa_bancontact_$CI_COMMIT_REF_NAME.zip

build zip bnpl:
  image: composer:1.9
  stage: build
  before_script:
    - php ./_dev/ci/generate-version.php
    - rm -r ./vendor
    - ./_dev/ci/dist-files.sh bnpl
    - composer install --no-dev
    - ./_dev/ci/copy_translations.sh
    - find ./vendor -type d -exec cp index.php {} \;
    - git status
    - chmod 777 ./_dev/ci/assets_revision.sh && ./_dev/ci/assets_revision.sh
    - mkdir payplug
  script:
    - shopt -s extglob
    - mv !(payplug|composer.json) payplug
    - cp composer.json ./payplug
    - sed -i 's/api.payplug.com/api-qa.payplug.com/' ./payplug/vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php
    - composer archive --file payplug_qa_bnpl_$CI_COMMIT_REF_NAME --format zip
  artifacts:
    paths:
      - payplug_qa_bnpl_$CI_COMMIT_REF_NAME.zip