include:
  - project: 'payplug/releasy'
    file: '/templates/main.gitlab-ci.yml'

stages:
  - check php
  - tests
  - translations
  - build
  - releasy-review
  - releasy-release

php cs fixer:
  image: composer:1.9
  stage: check php
  script:
    - composer install
    - vendor/bin/php-cs-fixer fix -vvv --dry-run --using-cache=no

unit tests:
  image: composer:1.9
  stage: tests
  script:
    - composer install
    - vendor/phpunit/phpunit/phpunit --bootstrap test/init.php test/tests
    - vendor/phpunit/phpunit/phpunit --exclude dev tests

check module translations:
  image: php:7.4
  stage: translations
  only: [merge_requests]
  script:
    - php ci/translations.php $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
  artifacts:
    paths:
      - ci/translations.csv

build zip release:
  image: composer:1.9
  stage: build
  before_script:
    - composer install --no-dev
    - ./ci/copy_translations.sh
    - ./ci/assets_revision.sh
    - find ./vendor -type d -exec cp index.php {} \;
    - git status
    - mkdir payplug
  script:
    - shopt -s extglob
    - mv !(payplug|composer.json) payplug
    - composer archive --file payplug_$CI_COMMIT_REF_NAME --format zip
    - sed -i 's/api.payplug.com/api.alpha.notpayplug.com/' ./payplug/vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php
    - composer archive --file payplug_alpha_$CI_COMMIT_REF_NAME --format zip
  artifacts:
    paths:
      - payplug_$CI_COMMIT_REF_NAME.zip
      - payplug_alpha_$CI_COMMIT_REF_NAME.zip
